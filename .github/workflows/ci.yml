name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voting_user
          POSTGRES_PASSWORD: voting_pass
          POSTGRES_DB: voting_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://voting_user:voting_pass@localhost:5432/voting_app_test
      SECRET_KEY: testsecretkey1234567890abcdefghijklmnop
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Debug environment
        run: |
          echo "Current directory:"
          pwd
          echo "Files in current directory:"
          ls -la
          echo "Python sys.path:"
          uv run python -c "import sys; print('\n'.join(sys.path))"
          echo "App folder contents:"
          ls -la app/ || echo "app/ folder not found"

      - name: Run tests
        run: uv run pytest -v